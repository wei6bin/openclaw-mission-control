name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: |
          make backend-sync || true
          make frontend-sync || true

      - name: Run backend lint
        run: make backend-lint || true

      - name: Run frontend lint
        run: make frontend-lint || true

      - name: Run frontend typecheck
        run: make frontend-typecheck || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: |
          make backend-sync || true
          make frontend-sync || true

      - name: Run backend tests
        env:
          AUTH_MODE: "local"
          LOCAL_AUTH_TOKEN: "ci-test-token"
        run: make backend-coverage || make backend-test || true

      - name: Run frontend tests
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_AUTH_MODE: "local"
        run: make frontend-test || true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: make frontend-sync || true

      - name: Build frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_AUTH_MODE: "local"
        run: make frontend-build || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            frontend/.next/
            frontend/public/

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: frontend/

      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."
          # Replace with actual deployment: rsync, SCP, kubectl, etc.

      - name: Wait for deployment
        run: sleep 30

      - name: Health check staging
        run: |
          echo "Health check staging..."
          # Replace with actual health check: curl -f https://staging.example.com/health || exit 1

  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rollback staging
        run: |
          echo "Rolling back staging deployment..."
          # Replace with actual rollback: revert to previous deployment/tag
          # Example:
          #   git revert HEAD --no-commit
          #   kubectl rollout undo deployment/staging
          #   docker pull app:previous-tag && docker-compose -f staging.yml up -d
          echo "Rollback triggered. Verify staging health after rollback."

      - name: Notify rollback
        run: |
          echo "::notice title=Rollback triggered::Pipeline detected failure in deploy-staging. Staging rolled back automatically. Review logs and re-trigger deployment after fixing issues."